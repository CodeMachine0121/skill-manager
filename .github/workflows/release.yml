name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            arch: x86_64
          - platform: macos-latest
            target: aarch64-apple-darwin
            arch: arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            arch: x86_64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and upload artifacts
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: "Release ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          tauriScript: bunx tauri

      - name: Rename release assets with arch label
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ github.ref_name }}"

          if [[ "${{ matrix.target }}" == "aarch64-apple-darwin" ]]; then
            OLD_SUFFIX="aarch64"
          else
            OLD_SUFFIX="x64"
          fi
          NEW_SUFFIX="${{ matrix.arch }}"

          gh api "repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}" \
            --jq ".assets[] | \"\(.id)\t\(.name)\"" | \
          while IFS=$'\t' read -r ASSET_ID ASSET_NAME; do
            NEW_NAME="${ASSET_NAME/${OLD_SUFFIX}/${NEW_SUFFIX}}"
            if [[ "$NEW_NAME" != "$ASSET_NAME" ]]; then
              gh api "repos/${{ github.repository }}/releases/assets/${ASSET_ID}" \
                --method PATCH -f name="${NEW_NAME}" > /dev/null
              echo "Renamed: ${ASSET_NAME} → ${NEW_NAME}"
            fi
          done
